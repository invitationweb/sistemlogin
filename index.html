<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Pilketos</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">
    <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-sm border-t-4 border-red-800">
        <h1 class="text-2xl font-bold text-center text-red-800 mb-6">LOGIN PEMILIH</h1>
        <div class="mb-4">
            <label class="block text-gray-700 text-sm font-bold mb-2">Masukkan NISN</label>
            <input type="number" id="nisnInput" class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-red-800" placeholder="Contoh: 1">
        </div>
        <button onclick="prosesLogin()" id="btnLogin" class="w-full bg-red-800 text-white font-bold py-2 rounded-lg hover:bg-red-900 transition">MASUK</button>
    </div>

    <script>
        async function prosesLogin() {
            const btn = document.getElementById('btnLogin');
            const val = document.getElementById('nisnInput').value;
            
            if(!val) return alert("Isi NISN dulu!");

            // Ubah tombol jadi 'Loading' agar user tahu proses sedang jalan
            btn.innerText = "Mengecek...";
            btn.disabled = true;

            try {
                // Mengambil data dari file voters.json dengan anti-cache
                const response = await fetch('voters.json', { cache: "no-store" });
                
                if (!response.ok) throw new Error("File JSON tidak ditemukan");
                
                const dataSiswa = await response.json();
                
                // Cari siswa (Input dan JSON dipastikan jadi String agar cocok)
                const user = dataSiswa.find(s => String(s.nisn) === String(val));

                if (user) {
                    sessionStorage.setItem('pemilih_aktif', JSON.stringify(user));
                    window.location.href = 'bilik-suara.html';
                } else {
                    alert("NISN " + val + " tidak terdaftar!");
                }
            } catch (err) {
                console.error(err);
                alert("Gagal koneksi ke database voters.json!");
            } finally {
                btn.innerText = "MASUK";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
