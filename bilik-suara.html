<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bilik Suara</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 pb-10">
    <nav class="bg-[#800000] text-white p-4 shadow-md sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <span id="namaUser" class="font-bold uppercase tracking-tight"></span>
            <button onclick="logout()" class="bg-white text-[#800000] px-4 py-1 rounded-lg font-bold text-sm">Logout</button>
        </div>
    </nav>

    <div class="container mx-auto px-4 mt-8">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <!-- Paslon 01 -->
            <div class="bg-white rounded-2xl shadow-lg border-2 border-gray-100 p-4 text-center">
                <div class="bg-gray-200 h-48 rounded-xl mb-4 flex items-center justify-center font-bold text-gray-400 uppercase">Foto Paslon 01</div>
                <h3 class="font-black text-xl mb-4">KANDIDAT 01</h3>
                <button onclick="pilih('PASLON 01')" class="w-full bg-[#800000] text-white py-3 rounded-xl font-bold shadow-md active:scale-95 transition">PILIH</button>
            </div>
            <!-- Paslon 02 -->
            <div class="bg-white rounded-2xl shadow-lg border-2 border-gray-100 p-4 text-center">
                <div class="bg-gray-200 h-48 rounded-xl mb-4 flex items-center justify-center font-bold text-gray-400 uppercase">Foto Paslon 02</div>
                <h3 class="font-black text-xl mb-4">KANDIDAT 02</h3>
                <button onclick="pilih('PASLON 02')" class="w-full bg-[#800000] text-white py-3 rounded-xl font-bold shadow-md active:scale-95 transition">PILIH</button>
            </div>
            <!-- Paslon 03 -->
            <div class="bg-white rounded-2xl shadow-lg border-2 border-gray-100 p-4 text-center">
                <div class="bg-gray-200 h-48 rounded-xl mb-4 flex items-center justify-center font-bold text-gray-400 uppercase">Foto Paslon 03</div>
                <h3 class="font-black text-xl mb-4">KANDIDAT 03</h3>
                <button onclick="pilih('PASLON 03')" class="w-full bg-[#800000] text-white py-3 rounded-xl font-bold shadow-md active:scale-95 transition">PILIH</button>
            </div>
        </div>
    </div>

    <script>
        const user = JSON.parse(sessionStorage.getItem('pemilih_aktif'));
        if(!user) window.location.href = 'index.html';
        document.getElementById('namaUser').innerText = user.nama;

        async function pilih(namaPaslon) {
            if(!confirm("Yakin memilih " + namaPaslon + "?")) return;
            
            // GANTI LINK DI BAWAH INI
            const scriptURL = 'https://script.google.com/macros/s/AKfycbwSt4l3qtpqlmy108efFMNO0kZcs0wvxh7wv9sY76yUgJ_uQ-ZpGBMZME-uZ62h6cQ7/exec';

            try {
                await fetch(scriptURL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify({ nisn: user.nisn, nama: user.nama, pilihan: namaPaslon })
                });
                alert("Suara Berhasil Dikirim!");
                sessionStorage.clear();
                window.location.href = 'index.html';
            } catch (e) {
                alert("Gagal mengirim suara.");
            }
        }

        function logout() { sessionStorage.clear(); window.location.href = 'index.html'; }
    </script>
</body>
</html>
