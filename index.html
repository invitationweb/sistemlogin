<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Pilketos</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">
    <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-sm border-t-4 border-red-800">
        <h1 class="text-2xl font-bold text-center text-red-800 mb-6">LOGIN PEMILIH</h1>
        <div class="mb-4">
            <label class="block text-gray-700 text-sm font-bold mb-2">Masukkan NISN</label>
            <input type="number" id="nisnInput" class="w-full px-3 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-red-800" placeholder="Contoh: 1">
        </div>
        <button onclick="prosesLogin()" class="w-full bg-red-800 text-white font-bold py-2 rounded-lg hover:bg-red-900 transition">MASUK</button>
    </div>

    <script>
        async function prosesLogin() {
            const val = document.getElementById('nisnInput').value;
            if(!val) return alert("Isi NISN dulu!");

            try {
                const res = await fetch('voters.json');
                const data = await res.json();
                
                // Mencocokkan input dengan data JSON secara akurat
                const user = data.find(s => String(s.nisn) === String(val));

                if (user) {
                    sessionStorage.setItem('pemilih_aktif', JSON.stringify(user));
                    window.location.href = 'bilik-suara.html';
                } else {
                    alert("NISN " + val + " tidak terdaftar!");
                }
            } catch (err) {
                alert("Gagal mengambil data! Pastikan sudah di-deploy di GitHub.");
            }
        }
    </script>
</body>
</html>
