<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Pilketos</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">
    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-sm border-t-8 border-[#800000]">
        <h1 class="text-2xl font-black text-center text-[#800000] mb-6">LOGIN PEMILIH</h1>
        <div class="mb-4">
            <label class="block text-gray-700 text-sm font-bold mb-2">Nomor NISN</label>
            <input type="number" id="nisnInput" class="w-full px-4 py-3 border-2 rounded-xl focus:outline-none focus:border-[#800000]" placeholder="Contoh: 1">
        </div>
        <button onclick="prosesLogin()" id="btnLogin" class="w-full bg-[#800000] text-white font-bold py-3 rounded-xl hover:bg-red-900 transition-all shadow-lg">MASUK</button>
    </div>

    <script>
        async function prosesLogin() {
            const btn = document.getElementById('btnLogin');
            const val = document.getElementById('nisnInput').value;
            if(!val) return alert("Isi NISN dulu!");

            btn.innerText = "Mengecek...";
            btn.disabled = true;

            try {
                const response = await fetch('voters.json', { cache: "no-store" });
                const dataSiswa = await response.json();
                const user = dataSiswa.find(s => String(s.nisn) === String(val));

                if (user) {
                    sessionStorage.setItem('pemilih_aktif', JSON.stringify(user));
                    window.location.href = 'bilik-suara.html';
                } else {
                    alert("NISN tidak terdaftar!");
                }
            } catch (err) {
                alert("Gagal memuat database voters.json!");
            } finally {
                btn.innerText = "MASUK";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
